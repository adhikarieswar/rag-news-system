name: RAG System CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pytest pandas chromadb sentence-transformers fastapi uvicorn
      
      - name: Run unit tests
        run: |
          python tests/test_my_project.py
      
      - name: Build Docker image
        run: |
          docker build -t rag-news-api .
      
      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      
      - name: Push Docker image
        run: |
          docker tag rag-news-api ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:latest
